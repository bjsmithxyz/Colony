<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module Test</title>
</head>
<body>
    <h1>Module Support Test</h1>
    <p>Check the console for messages</p>
    <script type="module">
        console.log('Modules are supported!');
        import('./js/config.js').then(module => {
            console.log('Config loaded:', module.CONFIG);
        }).catch(err => {
            console.error('Failed to load module:', err);
        });
    </script>
</body>
</html>
