<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony Simulation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <canvas id="simulationCanvas"></canvas>
        <div class="controls">
            <div class="info">
                <h2>Colony Simulation</h2>
                <p>Click to place nodes</p>
                <div class="stats-container">
                    <div class="stats-header" id="statsToggle">
                        <span>📊 Statistics</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div id="stats" class="stats-content">
                        <div class="stat-item">
                            <span class="stat-label">Nodes:</span>
                            <span class="stat-value" id="nodeCount">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Individuals:</span>
                            <span class="stat-value" id="individualCount">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Food:</span>
                            <span class="stat-value" id="totalFood">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Food Collected:</span>
                            <span class="stat-value" id="foodCollected">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Avg. Efficiency:</span>
                            <span class="stat-value" id="avgEfficiency">0%</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Active Modules:</span>
                            <span class="stat-value" id="activeModules">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="simulation-controls">
                    <button id="pausePlayBtn" class="control-btn">⏸️ Pause</button>
                    <label for="speedSlider">Speed:</label>
                    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
                    <span id="speedDisplay">1.0x</span>
                    <div class="performance-controls">
                        <label>
                            <input type="checkbox" id="lodToggle" checked>
                            Level of Detail (LOD)
                        </label>
                    </div>
                </div>
                
                <div class="node-controls">
                    <h3>Node Controls</h3>
                    <button id="spawnBtn" class="control-btn" disabled>Spawn Individual (10 food)</button>
                </div>
                
                <div class="module-panel">
                    <h3>Modules</h3>
                    <div class="module-controls">
                        <button id="saveBtn">Save</button>
                        <button id="loadBtn">Load</button>
                    </div>
                    <div id="moduleList" class="module-list">
                        <p class="placeholder">Select a node to see available modules</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu" style="display: none;">
        <div class="context-menu-header">Node Actions</div>
        <button class="context-menu-item" data-action="delete">🗑️ Delete Node</button>
        <button class="context-menu-item" data-action="duplicate">📋 Duplicate Node</button>
        <button class="context-menu-item" data-action="clear-modules">🧹 Clear Modules</button>
        <hr class="context-menu-divider">
        <button class="context-menu-item" data-action="info">ℹ️ Node Info</button>
    </div>
    
    <!-- Tooltip -->
    <div id="tooltip" class="tooltip" style="display: none;"></div>
    
    <script src="js/main.js" type="module"></script>
</body>
</html>
