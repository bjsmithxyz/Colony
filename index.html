<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Ubuntu font bundled locally via @font-face in styles.css -->
    <link rel="preload" href="/assets/fonts/ubuntu-300.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/ubuntu-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/ubuntu-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/ubuntu-700.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
    <canvas id="bgPixels" aria-hidden="true"></canvas>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Initialising Colony</h2>
            <p>Loading optimized modular architecture...</p>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="main-content">
            <!-- Simulation Canvas -->
            <div class="canvas-container">
                <canvas id="simulationCanvas"></canvas>
                <div class="canvas-overlay">
                    <div class="quick-actions">
                        <button id="pausePlayBtn" class="sim-control-link" title="Pause/Play">pause</button>
                        <button id="resetBtn" class="sim-control-link" title="Reset Simulation">reset</button>
                    </div>
                </div>
                <!-- Attached to canvas container: FPS badge, overview stats, speed control -->
                <div class="performance-indicator">
                    <span id="fpsIndicator" class="fps-badge">60 FPS</span>
                </div>
                <div id="overviewStats" class="overview-stats">
                    <div class="overview-line">Nodes: <span id="ov_nodeCount">0</span></div>
                    <div class="overview-line">Individuals: <span id="ov_individualCount">0</span></div>
                    <div class="overview-line">Food: <span id="ov_totalFood">0</span></div>
                    <div class="overview-line">Total collected: <span id="ov_foodCollected">0</span></div>
                </div>
                <div id="speedControlFloating" class="speed-control-floating">
                    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1" class="range-slider" aria-label="Simulation speed">
                    <span id="speedDisplay" class="speed-display compact">1.0x</span>
                </div>
            </div>

            <!-- Right control panel removed; stats and controls moved to canvas overlay -->
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu" style="display: none;">
        <div class="context-menu-header">Node Actions</div>
        <button class="context-menu-item" data-action="delete">
            <span class="context-icon">🗑️</span>
            Delete Node
        </button>
        <button class="context-menu-item" data-action="duplicate">
            <span class="context-icon">📋</span>
            Duplicate Node
        </button>
    
        <hr class="context-menu-divider">
        <button class="context-menu-item" data-action="info">
            <span class="context-icon">ℹ️</span>
            Node Info
        </button>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip" style="display: none;"></div>

    

    <script src="js/bgPixels.js"></script>
    <script src="js/EnhancedUI.js"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>
