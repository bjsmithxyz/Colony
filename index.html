<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="js/EnhancedUI.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Initialising Colony</h2>
            <p>Loading optimized modular architecture...</p>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="main-content">
            <!-- Simulation Canvas -->
            <div class="canvas-container">
                <canvas id="simulationCanvas"></canvas>
                <div class="canvas-overlay">                <div class="quick-actions">
                    <button class="quick-action-btn" id="pausePlayBtn" title="Pause/Play">
                        <span class="btn-icon">⏸️</span>
                        <span class="btn-label">Pause</span>
                    </button>
                    <button class="quick-action-btn" id="resetBtn" title="Reset Simulation">
                        <span class="btn-icon">🔄</span>
                        <span class="btn-label">Reset</span>
                    </button>
                </div>
                    <div class="performance-indicator">
                        <span id="fpsIndicator" class="fps-badge">60 FPS</span>
                    </div>
                </div>
            </div>

            <!-- Control Panel -->
            <aside class="control-panel">
                <div class="panel-content">
                    <!-- Statistics Card -->
                    <div class="control-card stats-card">
                        <div class="card-header collapsible" id="statsToggle">
                            <h3 class="card-title">
                                <span class="card-icon">📊</span>
                                Statistics
                            </h3>
                            <span class="collapse-icon">▼</span>
                        </div>
                        <div id="stats" class="card-content collapsible-content">
                            <div class="stats-tabs">
                                <button class="stats-tab active" data-tab="overview">Overview</button>
                                <button class="stats-tab" data-tab="charts">Charts</button>
                                <button class="stats-tab" data-tab="performance">Performance</button>
                            </div>
                            
                            <div class="stats-content">
                                <!-- Overview Tab -->
                                <div class="stats-tab-content active" id="overview">
                                    <div class="stats-grid">
                                        <div class="stat-item">
                                            <div class="stat-value" id="nodeCount">0</div>
                                            <div class="stat-label">Nodes</div>
                                        </div>
                                        <div class="stat-item">
                                            <div class="stat-value" id="individualCount">0</div>
                                            <div class="stat-label">Individuals</div>
                                        </div>
                                        <div class="stat-item">
                                            <div class="stat-value" id="totalFood">0</div>
                                            <div class="stat-label">Total Food</div>
                                        </div>
                                        <div class="stat-item">
                                            <div class="stat-value" id="foodCollected">0</div>
                                            <div class="stat-label">Collected</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Charts Tab -->
                                <div class="stats-tab-content" id="charts">
                                    <div class="chart-container">
                                        <canvas id="populationChart"></canvas>
                                    </div>
                                    <div class="chart-container">
                                        <canvas id="foodChart"></canvas>
                                    </div>
                                </div>
                                
                                <!-- Performance Tab -->
                                <div class="stats-tab-content" id="performance">
                                    <div class="performance-grid">
                                        <div class="performance-item">
                                            <div class="performance-value" id="currentFPS">--</div>
                                            <div class="performance-label">Current FPS</div>
                                        </div>
                                        <div class="performance-item">
                                            <div class="performance-value" id="avgFPS">--</div>
                                            <div class="performance-label">Avg FPS</div>
                                        </div>
                                        <div class="performance-item">
                                            <div class="performance-value" id="lodLevel">High</div>
                                            <div class="performance-label">LOD Level</div>
                                        </div>
                                        <div class="performance-item">
                                            <div class="performance-value" id="memoryUsage">--</div>
                                            <div class="performance-label">Memory</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Simulation Controls Card -->
                    <div class="control-card simulation-card">
                        <div class="card-header">
                            <h3 class="card-title">
                                <span class="card-icon">⚡</span>
                                Simulation
                            </h3>
                        </div>
                        <div class="card-content">
                            <div class="control-group">
                                <label class="control-label">Speed</label>
                                <div class="speed-control">
                                    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1" class="range-slider">
                                    <span id="speedDisplay" class="speed-display">1.0x</span>
                                </div>
                            </div>
                            <div class="control-group">
                                <label class="control-label">Performance</label>
                                <div class="checkbox-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="lodToggle">
                                        <span class="checkbox-custom"></span>
                                        Level of Detail (LOD)
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Node Controls removed -->
                    <!-- Modules area removed -->
                </div>
            </aside>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu" style="display: none;">
        <div class="context-menu-header">Node Actions</div>
        <button class="context-menu-item" data-action="delete">
            <span class="context-icon">🗑️</span>
            Delete Node
        </button>
        <button class="context-menu-item" data-action="duplicate">
            <span class="context-icon">📋</span>
            Duplicate Node
        </button>
    <!-- Module clear action removed -->
        <hr class="context-menu-divider">
        <button class="context-menu-item" data-action="info">
            <span class="context-icon">ℹ️</span>
            Node Info
        </button>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip" style="display: none;"></div>

    

    <script src="js/main.js" type="module"></script>
</body>
</html>
