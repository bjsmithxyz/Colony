<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Resolve relative assets on GitHub project pages (e.g. /Colony/) -->
    <script>
    (function () {
        if (!location.hostname.endsWith('github.io')) return;
        var parts = location.pathname.split('/').filter(Boolean);
        if (parts.length === 0) return;
        var repo = parts[0];
        var base = document.createElement('base');
        base.href = '/' + repo + '/';
        document.head.appendChild(base);
    })();
    </script>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'none';">
    <title>Colony</title>
    <!-- Tiny inline favicon to avoid 404 noise during local dev -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%231a1a1a'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="bgPixels" aria-hidden="true"></canvas>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Initialising Colony</h2>
            <p>Loading optimised modular architecture...</p>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="main-content">
            <!-- Simulation Canvas -->
            <div class="canvas-container">
                <canvas id="simulationCanvas"></canvas>
                <div class="canvas-overlay">
                    <div class="quick-actions">
                        <button id="pausePlayBtn" class="sim-control-link" title="Pause/Play">pause</button>
                        <button id="resetBtn" class="sim-control-link" title="Reset Simulation">reset</button>
                    </div>
                </div>
                <!-- Attached to canvas container: FPS badge, overview stats, speed control -->
                <div class="performance-indicator">
                    <span id="fpsIndicator" class="fps-badge">60 FPS</span>
                </div>
                <div id="overviewStats" class="overview-stats">
                    <div class="overview-line">nodes: <span id="ov_nodeCount">0</span></div>
                    <div class="overview-line">individuals: <span id="ov_individualCount">0</span></div>
                    <div class="overview-line">current food: <span id="ov_totalFood">0</span></div>
                    <div class="overview-line">total collected: <span id="ov_foodCollected">0</span></div>
                </div>
                <div id="speedControlFloating" class="speed-control-floating">
                    <input type="range" id="speedSlider" min="0.1" max="2" step="0.1" value="1" class="range-slider" aria-label="Simulation speed">
                    <span id="speedDisplay" class="speed-display compact">1.0x</span>
                </div>
            </div>

            <!-- Right control panel removed; stats and controls moved to canvas overlay -->
        </div>
    </div>

    <!-- Non-blocking reset confirmation modal (replaces blocking confirm()) -->
    <div id="resetModal" class="reset-modal" style="display:none;">
        <div class="reset-modal-backdrop"></div>
        <div class="reset-modal-content">
            <h3>Reset Simulation</h3>
            <p>Are you sure you want to reset the simulation? This will clear all nodes and data.</p>
            <div class="reset-modal-actions">
                <button id="resetModalConfirm" class="action-btn">Reset</button>
                <button id="resetModalCancel" class="action-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip" style="display: none;"></div>

    

    <script src="js/main.js" type="module"></script>
</body>
</html>
